version: "3.8"

services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: idp-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8081:8080"
    networks:
      - idp-network

  redis:
    image: redis:7-alpine
    container_name: idp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - idp-network

  mongodb:
    image: mongo:7
    container_name: idp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - idp-network

volumes:
  redis_data:
  mongodb_data:

networks:
  idp-network:
    driver: bridge